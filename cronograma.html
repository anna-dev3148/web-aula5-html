<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Cronograma ADS</title>

    <style>

        table,
        th,
        td {
            border: 1px solid black;
            border-collapse: collapse;
        }

        .semestre {
            background-color: #e2e2e2;
            font-weight: bold;
        }   

        
        body {
            font-family: sans-serif;
            margin: 20px;
        }

        .semester-header {
            background-color: #e2e2e2;
            font-weight: bold;
        }

        th {
            background-color: #f2f2f2;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #444;
            padding: 10px;
            text-align: left
        }

    </style>
</head>

<body>

    <h2>Cronograma do curso de Análise e Desenvolvimento de Sistemas</h2>

    <table>
        <tr>
            <th>Horário</th>
            <th>Seg</th>
            <th>Ter</th>
            <th>Qua</th>
            <th>Qui</th>
            <th>Sex</th>
        </tr>

        <tr>
            <td>19:00 - 20:30</td>
            <td>BRTREDC</td>
            <td>BRTDWEB</td>
            <td>BRTEST2</td>
            <td>BRTBAN2</td>
            <td>BRTENGS</td>

        </tr>

        <tr>
            <td>20:30 - 20:45</td>
            <th colspan="5">Intervalo</th>

        </tr>
        
        <tr>
            <td>20:45 - 22:15</td>
            <td>BRTREDC</td>
            <td>BRTDWEB</td>
            <td>BRTEST2</td>
            <td>BRTBAN2</td>
            <td>BRTENGS</td>
        </tr>

    </table>
</body>

</html>
